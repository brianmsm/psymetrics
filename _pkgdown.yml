url: https://brianmsm.github.io/psymetrics/

template:
  bootstrap: 5
  light-switch: true
  bslib:
    bootswatch: flatly
    navbar-light-bg: "#1187dd"
    navbar-dark-bg: "#141f35"

home:
  title: psymetrics
  description: >
    Unified tools for psychometric model fit analysis, model parameter extraction,
    reporting, and visualization.
  links:
    - text: Get started
      href: articles/get-started-fit-indices.html
    - text: Roadmap
      href: ROADMAP.html
    - text: Changelog
      href: news/index.html

navbar:
  structure:
    left: [get-started, reference, articles, news]
    right: [search, github, lightswitch]
  components:
    get-started:
      text: Get started
      href: articles/get-started-fit-indices.html
    articles:
      text: Articles
      menu:
      - text: Core Workflows
      - text: SEM, parameter estimates, and comparisons with lavaan
        href: articles/sem-and-estimates-lavaan.html
      - text: Reporting and visualization
        href: articles/reporting-and-visualization.html

articles:
  - title: Core Workflows
    contents:
      - get-started-fit-indices
      - sem-and-estimates-lavaan
      - reporting-and-visualization

reference:
  - title: Fit Indices
    contents:
      - model_fit
      - model_fit.lavaan
      - compare_model_fit
  - title: Model Estimates
    contents:
      - model_estimates
      - model_estimates.lavaan
      - compare_model_estimates
  - title: Reporting And Tables
    contents:
      - format_results
      - save_table
  - title: Visualization
    contents:
      - plot_model_fit
      - plot_factor_loadings
      - plot.lavaan
      - plot-methods
  - title: S3 Print Methods
    contents:
      - print.model_fit
      - print.compare_model_fit
      - print.model_estimates
      - print.compare_model_estimates
